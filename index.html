<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="translate">
    <meta name="color-scheme" content="light dark">
    <title>Language study.</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>

<body>
<header>
    <h1 class = "h1">LANGUAGE STUDY</h1>

    <div class="settings-container">
        <button id="settingsBtn" class = "setting">⚙️</button>

        <div id="settingsMenu" class="hidden-menu">
            <button id="themeBtn">Сменить тему / Change Theme</button>
        </div>
    </div>
</header>



<audio id="bg-music" loop>
    <source src="music/de144d31b1f3b3f.mp3" type="audio/mpeg">
</audio>

<script>

    document.body.addEventListener('click', function() {
        const audio = document.getElementById('bg-music');
        audio.play();
    }, { once: true });
</script>
<script>
    document.body.addEventListener('click', function() {
        const audio = document.getElementById('bg-music');

        audio.volume = 0.1;

        audio.play();
    }, { once: true });
</script>


<main>
    <!-- ВЫБОР ЯЗЫКА -->
    <section id="startScreen" class="card">
        <h2>Выбери язык для изучения / Choose a language to learn</h2>
        <div class="lang-buttons">
            <button class="langBtn" data-lang="ru">🇷🇺 Русский / Russian</button>
            <button class="langBtn" data-lang="en">🇬🇧 Английский / English</button>
            <button class="langBtn" data-lang="fr">🇫🇷 Французский / French</button>
            <button class="langBtn" data-lang="es">🇪🇸 Испанский / Spanish</button>
            <button class="langBtn" data-lang="sv">🇸🇪 Шведский / Swedish</button>
            <button class="langBtn" data-lang="tt">🇷🇺 Татарский / Tatar</button>
            <button class="langBtn" data-lang="id">🇮🇩 Индонезийский / Indonesian</button>
            <button class="langBtn" data-lang="be">🇧🇾 Белорусский / Belorussian</button>
            <button class="langBtn" data-lang="hi">🇮🇳 Хинди / Hindi</button>
            <button class="langBtn" data-lang="sa">🇸🇦 Арабский / Arabic</button>
            <button class="langBtn" data-lang="pt">🇵🇹 Португальский / Portuguese</button>
            <button class="langBtn" data-lang="zh">🇨🇳 Китайский / Chinese</button>
            <button class="langBtn" data-lang="de">🇩🇪 Немецкий / German</button>
            <button class="langBtn" data-lang="ja">🇯🇵 Японский / Japanese</button>
            <button class="langBtn" data-lang="pl">🇵🇱 Польский / Polish</button>
        </div>
    </section>

    <!-- КВИЗ -->
    <button id="backBtn" style="display: none; background: none; border: none; color: gray; font-size: 1.1rem; font-weight: bold; cursor: pointer; padding: 10px 14px;">
        ← Назад / Back
    </button>
    <section id="quizScreen" class="card hidden">

        <div class="progress">
            Вопрос <span id="current">1</span> / <span id="total">10</span>
        </div>

        <h2 id="question">Загрузка вопроса...</h2>

        <!-- КОНТЕЙНЕР ДЛЯ ПОЛЯ ВВОДА И ПОДСКАЗКИ -->
        <div class="input-wrapper">
            <label for="textInput"></label><input id="textInput" type="text" placeholder="Введите перевод..." autocomplete="off" />
            <button class="hint-btn" onclick="giveHint()" type="button" title="Получить подсказку">💡</button>
        </div>

        <button id="submitBtn">Ответить</button>


        <p id="result"></p>
    </section>
</main>

<footer class="footer-text">
    © 2026 language Study. Все права защищены / © 2026 language study. All rights reserved. <!-- Все права защищены авторским правом! -->
</footer>
